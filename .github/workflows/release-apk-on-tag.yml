name: Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Resolve build variant
        id: variant
        run: |
          if [ -n "${RELEASE_KEYSTORE_PATH:-}" ] && \
             [ -n "${RELEASE_KEYSTORE_PASSWORD:-}" ] && \
             [ -n "${RELEASE_KEY_ALIAS:-}" ] && \
             [ -n "${RELEASE_KEY_PASSWORD:-}" ]; then
            echo "build_task=assembleRelease" >> "$GITHUB_OUTPUT"
            echo "artifact_path=app/build/outputs/apk/release" >> "$GITHUB_OUTPUT"
            echo "artifact_name=sms2dingtalk-release-${GITHUB_REF_NAME}.apk" >> "$GITHUB_OUTPUT"
            echo "Using release build (signing env detected)."
          else
            echo "::warning::Signing config not found, fallback to debug build."
            echo "build_task=assembleDebug" >> "$GITHUB_OUTPUT"
            echo "artifact_path=app/build/outputs/apk/debug" >> "$GITHUB_OUTPUT"
            echo "artifact_name=sms2dingtalk-debug-${GITHUB_REF_NAME}.apk" >> "$GITHUB_OUTPUT"
            echo "Using debug fallback."
          fi

      - name: Build release APK
        shell: bash
        run: |
          WORKDIR="${GITHUB_WORKSPACE:-$(pwd)}"
          cd "$WORKDIR"

          run_gradle() {
            local task="$1"
            local attempt
            local max_attempts=3

            for attempt in 1 2 3; do
              echo "Gradle task '$task' attempt ${attempt}/${max_attempts}"

              if [ -x ./gradlew ]; then
                ./gradlew "$task" && return 0
              else
                gradle "$task" && return 0
              fi

              echo "Gradle task '$task' failed on attempt ${attempt}"
              if [ "$attempt" -lt "$max_attempts" ]; then
                local sleep_sec=$((attempt * 10))
                echo "Wait ${sleep_sec}s and retry..."
                sleep "$sleep_sec"
              fi
            done

            echo "Gradle task '$task' failed after ${max_attempts} attempts"
            return 1
          }

          if [ "${{ steps.variant.outputs.build_task }}" = "assembleRelease" ]; then
            run_gradle assembleRelease
          else
            run_gradle assembleDebug
          fi

          APK_PATH="$(find "${{ steps.variant.outputs.artifact_path }}" -name '*.apk' | head -n 1 || true)"
          if [ -z "$APK_PATH" ]; then
            echo "APK not found under ${{ steps.variant.outputs.artifact_path }}"
            exit 1
          fi

      - name: Rename APK
        run: |
          mkdir -p out
          APK_PATH="$(find "${{ steps.variant.outputs.artifact_path }}" -name '*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "APK not found"
            exit 1
          fi
          cp "$APK_PATH" "out/${{ steps.variant.outputs.artifact_name }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.apk
