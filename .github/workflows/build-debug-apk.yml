name: Android CI

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build debug APK
        run: |
          WORKDIR="${GITHUB_WORKSPACE:-$(pwd)}"
          cd "$WORKDIR"
          if [ ! -f settings.gradle.kts ] && [ ! -f settings.gradle ] && [ ! -f settings.gradle.dcl ]; then
            echo "Missing settings.gradle* in $WORKDIR"
            exit 1
          fi
          if [ ! -f build.gradle.kts ] && [ ! -f build.gradle ] && [ ! -f build.gradle.dcl ]; then
            echo "Missing build.gradle* in $WORKDIR"
            exit 1
          fi
          if [ -x ./gradlew ]; then
            ./gradlew clean
          else
            gradle clean
          fi
          if [ -x ./gradlew ]; then
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
